kind = "web"
previewPath = "/"
title = "AutoCoder"
version = "1.0.0"
id = "artifacts/autocoder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21290
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/autocoder run dev"

[services.env]
PORT = "21290"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/autocoder", "run", "build"]
publicDir = "artifacts/autocoder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
